<div class="p-6 max-w-4xl mx-auto">
  <h2 class="text-3xl font-bold mb-6 text-center text-pink-600">⚙️ Settings & Users / Paramètres & Utilisateurs</h2>

  <!-- Liste des utilisateurs -->
  <div class="bg-white shadow rounded-lg p-4 mb-6">
    <h3 class="text-xl font-semibold mb-4">Users / Utilisateurs</h3>
    <ul>
      <li *ngFor="let u of users" class="border-b py-2 flex justify-between items-center">
        <span>{{ u.username }} - Role: {{ u.role }}</span>
        <button (click)="deleteUser(u.id!)" class="bg-red-500 text-white px-2 py-1 rounded">🗑️ Delete / Supprimer</button>
      </li>
    </ul>
  </div>

  <!-- Formulaire d’ajout -->
  <div class="bg-gray-50 shadow rounded-lg p-4">
    <h3 class="text-xl font-semibold mb-4">Add a User / Ajouter un utilisateur</h3>
    <form (ngSubmit)="addUser()" class="space-y-3">
      <input [(ngModel)]="newUser.username" name="username" placeholder="Username"
             class="border p-2 w-full rounded focus:ring-2 focus:ring-pink-400" />
      <select [(ngModel)]="newUser.role" name="role" class="border p-2 w-full rounded">
        <option value="admin">Admin</option>
        <option value="staff">Staff</option>
      </select>
      <button type="submit"
              class="bg-pink-600 hover:bg-pink-700 text-white px-4 py-2 rounded w-full">
        ➕ Add / Ajouter
      </button>
    </form>
  </div>
</div>
