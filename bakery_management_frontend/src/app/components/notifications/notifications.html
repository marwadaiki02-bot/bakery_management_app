<div class="p-6 max-w-4xl mx-auto">
  <h2 class="text-3xl font-bold mb-6 text-center text-pink-600 dark:text-pink-300">🔔 Notifications & Dark Mode</h2>

  <!-- Liste des notifications -->
  <div class="bg-white dark:bg-gray-800 shadow rounded-lg p-4 mb-6">
    <h3 class="text-xl font-semibold mb-4 text-gray-700 dark:text-gray-200">Notifications</h3>
    <ul>
      <li *ngFor="let n of notifications" class="border-b py-2 text-gray-600 dark:text-gray-300">{{ n }}</li>
    </ul>
  </div>

  <!-- Formulaire d’ajout -->
  <div class="bg-gray-50 dark:bg-gray-700 shadow rounded-lg p-4">
    <h3 class="text-xl font-semibold mb-4 text-gray-700 dark:text-gray-200">Add Notification / Ajouter une notification</h3>
    <form (ngSubmit)="addNotification()" class="space-y-3">
      <input [(ngModel)]="newMessage" name="message" placeholder="Message"
             class="border p-2 w-full rounded focus:ring-2 focus:ring-pink-400 dark:bg-gray-600 dark:text-white" />
      <button type="submit"
              class="bg-pink-600 hover:bg-pink-700 text-white px-4 py-2 rounded w-full">
        ➕ Add / Ajouter
      </button>
    </form>
  </div>

  <!-- Dark Mode Toggle -->
  <div class="mt-6 text-center">
    <button (click)="toggleDarkMode()" class="bg-gray-900 text-white px-4 py-2 rounded">
      🌙 Toggle Dark Mode / Activer le mode sombre
    </button>
  </div>
</div>
