<div class="flex items-center justify-center min-h-screen bg-gradient-to-r from-pink-500 via-red-500 to-yellow-500">
  <div class="bg-white shadow-2xl rounded-xl p-8 w-96">
    <h2 class="text-3xl font-extrabold mb-6 text-center text-pink-600">
      🔑 Login / Connexion
    </h2>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">
      <div>
        <label class="block text-gray-700 mb-2">Username / Nom d'utilisateur</label>
        <input formControlName="username" placeholder="Enter username"
               class="border p-3 w-full rounded-lg focus:ring-2 focus:ring-pink-400" />
      </div>
      <div>
        <label class="block text-gray-700 mb-2">Password / Mot de passe</label>
        <input formControlName="password" type="password" placeholder="Enter password"
               class="border p-3 w-full rounded-lg focus:ring-2 focus:ring-pink-400" />
      </div>
      <button type="submit"
              class="bg-pink-600 hover:bg-pink-700 text-white px-4 py-3 rounded-lg w-full font-semibold shadow-lg transition"
              [disabled]="loginForm.invalid">
        Login / Connexion
      </button>
    </form>
  </div>
</div>
