<div class="p-6 max-w-4xl mx-auto">
    <h2 class="text-3xl font-bold mb-6 text-center text-pink-600">🍰 Cakes Management / Gestion des Gâteaux</h2>

    <!-- Liste des gâteaux -->
    <div class="bg-white shadow rounded-lg p-4 mb-6">
        <h3 class="text-xl font-semibold mb-4">Available Cakes / Gâteaux disponibles</h3>
        <ul>
            <li *ngFor="let c of cakes" class="border-b py-2 flex justify-between items-center">
                <span>{{ c.name }} - {{ c.category }} - {{ c.price }}€ - Stock: {{ c.stock }}</span>
                <button (click)="deleteCake(c.id!)" class="bg-red-500 text-white px-2 py-1 rounded">🗑️ Delete /
                    Supprimer</button>
            </li>
        </ul>
    </div>

    <!-- Formulaire d’ajout -->
    <div class="bg-gray-50 shadow rounded-lg p-4">
        <h3 class="text-xl font-semibold mb-4">Add a Cake / Ajouter un gâteau</h3>
        <form (ngSubmit)="addCake()" class="space-y-3">
            <input [(ngModel)]="newCake.name" name="name" placeholder="Name / Nom"
                class="border p-2 w-full rounded focus:ring-2 focus:ring-pink-400" />
            <input [(ngModel)]="newCake.category" name="category" placeholder="Category / Catégorie"
                class="border p-2 w-full rounded focus:ring-2 focus:ring-pink-400" />
            <input [(ngModel)]="newCake.price" name="price" type="number" placeholder="Price / Prix"
                class="border p-2 w-full rounded focus:ring-2 focus:ring-pink-400" />
            <input [(ngModel)]="newCake.stock" name="stock" type="number" placeholder="Stock"
                class="border p-2 w-full rounded focus:ring-2 focus:ring-pink-400" />
            <button type="submit" class="bg-pink-600 hover:bg-pink-700 text-white px-4 py-2 rounded w-full">
                ➕ Add / Ajouter
            </button>
        </form>
    </div>
</div>
